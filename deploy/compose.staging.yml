# Firebat staging. The application joins the existing `staging-mariadb` over the
# shared external network; it gets its own database and its own user, and no
# database port is published anywhere.
#
# Staging is a separate identity as well as a separate database: its own
# `YURA_CHESS_IDENTITY_SALT` and the `yura_chess_staging` DSN live in
# `/srv/yura-chess/staging.env`, so a staging owner key can never resolve to a
# production player and test data is deletable without touching real games.
services:
  app:
    image: ${YURA_CHESS_IMAGE:?set an immutable image tag}
    restart: unless-stopped
    env_file:
      # Present on Firebat only, so `docker compose config` still validates elsewhere.
      - path: ${YURA_CHESS_ENV_FILE:-/srv/yura-chess/staging.env}
        required: false
    environment:
      YURA_CHESS_ENVIRONMENT: test
      TZ: UTC
    # Published on the container's loopback only; an Incus proxy-device forwards
    # it to the host loopback for nginx.
    ports:
      - "127.0.0.1:${YURA_CHESS_PORT:-8081}:8000"
    networks:
      - staging-db
    read_only: true
    tmpfs:
      # The board renderer works in memory; only Python's own scratch space is writable.
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
    healthcheck:
      # Liveness only: an unhealthy container is restarted, which cannot repair a
      # degraded engine pool or database. Readiness gates the deploy instead.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Run by deploy.sh as a release step before app starts; never left running.
  migrate:
    image: ${YURA_CHESS_IMAGE:?set an immutable image tag}
    profiles: ["release"]
    env_file:
      # Present on Firebat only, so `docker compose config` still validates elsewhere.
      - path: ${YURA_CHESS_ENV_FILE:-/srv/yura-chess/staging.env}
        required: false
    command: ["alembic", "upgrade", "head"]
    networks:
      - staging-db
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: "no"

networks:
  staging-db:
    external: true
    name: ${STAGING_DB_NETWORK:-lemp-shared}
