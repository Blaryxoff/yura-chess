# Host nginx on Firebat: TLS and SNI for the public skill endpoint.
#
# The skill is public and must NOT be behind basic auth — Yandex Alice cannot
# authenticate. Protection is TLS, body/time limits and rate limiting instead.
# The upstream is the Incus proxy-device on the host loopback.

# Alice traffic arrives through a small shared Yandex egress pool, so a low
# per-IP limit would become a global limit for unrelated players.
limit_req_zone $binary_remote_addr zone=yura_chess_webhook:10m rate=200r/s;

upstream yura_chess_app {
    server 127.0.0.1:8082;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name chess.waxim.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Firebat's stream layer owns public :443 and forwards web TLS here with
    # the PROXY protocol so nginx keeps the real client address.
    listen 127.0.0.1:8443 ssl proxy_protocol;
    http2 on;
    server_name chess.waxim.ru;

    include /etc/nginx/snippets/waxim-ssl.conf;
    auth_basic off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # An Alice payload is small; anything larger is not a webhook.
    client_max_body_size 64k;
    client_body_timeout 5s;
    client_header_timeout 5s;

    access_log /var/log/nginx/chess.waxim.ru.access.log;
    error_log  /var/log/nginx/chess.waxim.ru.error.log warn;

    location ~ ^/(?:robots\.txt|sitemap\.xml|yandex_67cb474818f8d2b2\.html)?$ {
        limit_except GET HEAD {
            deny all;
        }

        proxy_pass http://yura_chess_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    location = /alice/webhook {
        limit_req zone=yura_chess_webhook burst=400 nodelay;
        limit_req_status 429;

        # A location-level add_header replaces inherited server headers.
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow, nosnippet" always;

        proxy_pass http://yura_chess_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Alice abandons the request after 5 s and the skill answers within 4.5;
        # nginx must not hold a connection either side considers dead.
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    location ~ ^/favicon\.(?:svg|ico)$ {
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;

        proxy_pass http://yura_chess_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Probed from the host only; not part of the public surface.
    location /health/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://yura_chess_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
