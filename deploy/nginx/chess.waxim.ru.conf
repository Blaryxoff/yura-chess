# Host nginx on Firebat: TLS and SNI for the public skill endpoint.
#
# The skill is public and must NOT be behind basic auth — Yandex Alice cannot
# authenticate. Protection is TLS, body/time limits and rate limiting instead.
# The upstream is the Incus proxy-device on the host loopback.

limit_req_zone $binary_remote_addr zone=yura_chess_webhook:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=yura_chess_conn:10m;

upstream yura_chess_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name chess.waxim.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chess.waxim.ru;

    ssl_certificate     /etc/letsencrypt/live/chess.waxim.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess.waxim.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:yura_chess_tls:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # An Alice payload is small; anything larger is not a webhook.
    client_max_body_size 64k;
    client_body_timeout 5s;
    client_header_timeout 5s;

    access_log /var/log/nginx/chess.waxim.ru.access.log;
    error_log  /var/log/nginx/chess.waxim.ru.error.log warn;

    location = /alice/webhook {
        limit_req zone=yura_chess_webhook burst=20 nodelay;
        limit_conn yura_chess_conn 20;
        limit_req_status 429;

        proxy_pass http://yura_chess_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Alice abandons the request after 5 s and the skill answers within 4.5;
        # nginx must not hold a connection either side considers dead.
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Probed from the host only; not part of the public surface.
    location /health/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://yura_chess_app;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
