# Local development only: the service binds to loopback and its credentials are
# throwaway defaults. Firebat staging and production use deploy/compose.*.yml.
services:
  # Optional: `docker compose up app` runs the same image the deployment uses.
  # Day-to-day development runs uvicorn from the host instead.
  app:
    build:
      context: .
    profiles: ["app"]
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      YURA_CHESS_DATABASE_URL: mysql+pymysql://${MARIADB_USER:-yura_chess}:${MARIADB_PASSWORD:-yura_chess_dev}@mariadb:3306/${MARIADB_DATABASE:-yura_chess}?charset=utf8mb4
    ports:
      - "127.0.0.1:${YURA_CHESS_PORT:-8000}:8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-yura_chess}
      MARIADB_USER: ${MARIADB_USER:-yura_chess}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-yura_chess_dev}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_dev}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MARIADB_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mariadb-data:
